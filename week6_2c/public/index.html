<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Age Calculator</title>
  <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #d2e5f7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
    }
    h1{
        color: #2c3e50;
        font-size: 2cm;
    }
    p{
        font-size: 24px;
    }
    div{
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    label {
        display: block;
        margin-top: 8px;
        margin-bottom: 8px;
        font-size: 20px;
        color: #555;
    }
    div {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    button{
        padding: 9px 20px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Age Calculator</h1>
  <p>Enter your birth year to find out your age:</p>

  <form action="/age" method="GET">
    <div>
      <label for="year">Birth Year:</label>
      <input type="text" id="year" name="year" placeholder="e.g. 2000" required>
    </div>
    <br>
    <button type="submit">Calculate Age</button>
  </form>

</body>
</html>
